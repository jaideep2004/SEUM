version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: seum-postgres
    environment:
      POSTGRES_USER: seum
      POSTGRES_PASSWORD: seum_dev_pass
      POSTGRES_DB: seum
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seum -d seum"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seum-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
